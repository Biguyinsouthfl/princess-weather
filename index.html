<!DOCTYPE html>
<html>
<head>
<title>Princess Weather Command Center</title>
</head>
<body style="background:black;color:white;font-family:Arial;margin:0;">

  

  <div style="padding:20px;text-align:center;border-bottom:1px solid #333;">

    <h1>Princess Weather Command Center</h1>

    <p>Status: Online</p>

  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;">

    <div style="background:#111;padding:15px;border-radius:10px;">

      <h2>Current Conditions</h2>

      <p>--</p>

    </div>

    <div style="background:#111;padding:15px;border-radius:10px;">

      <h2>Storm Alerts</h2>

      <p>No alerts</p>

    </div>

    <div style="background:#111;padding:15px;border-radius:10px;">

      <h2>Radar</h2>

      <p>Coming soon</p>

    </div>

    <div style="background:#111;padding:15px;border-radius:10px;">

      <h2>Princess Status</h2>

      <p>Watching weather calmly</p>

    </div>

  </div>

</body>
</html>
