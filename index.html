<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Weather Dashboard</title>

<!-- Include Chart.js for the multi-city telemetry graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* PRINCESS LOGO OVERLAY */
#princess {
    position: fixed;
    top: 15px;
    left: 15px;
    height: 65px;
    width: auto;
    z-index: 99999;
    pointer-events: none;
}

/* MASTER TWO-ROW STRUCTURAL LOCK - PREVENTS COLLAPSE */
.grid {
    display: grid;
    grid-template-columns: 1.8fr 1fr 1fr 1fr; /* Widened Column 1 for Map Menu room */
    grid-template-rows: 72% 28%; /* Explicit row height lock */
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

/* VERTICAL INNER STACKS FOR VISUAL BALANCE */
.video-double-stack {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    height: 100%;
}

/* COMPONENT CARDS */
.box {
    background: #050505;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    padding: 12px;
    overflow: hidden;
    font-size: 16px;
    line-height: 1.3;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0; /* Keeps elements from breaking out of parent constraints */
}

.mapBox {
    background: #ffffff;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    overflow: hidden;
    height: 100%;
}

/* TEXT DESIGN & PALETTES */
.section-title {
    font-size: 14px;
    font-weight: bold;
    color: #45f3ff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
}

.metric-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid #111;
}

.big-temp-display {
    font-size: 38px;
    font-weight: bold;
    margin: 3px 0;
}

/* NEWS DISPLAY EFFECT */
#news-ticker {
    font-size: 14px;
    color: #fff;
    font-weight: bold;
    line-height: 1.4;
    transition: opacity 0.4s ease-in-out;
}

/* THEME CLASSES */
.hot { color: #ff3b3b; }
.warm { color: #ff8c1a; }
.mid { color: #ffd84d; }
.cool { color: #66ccff; }
.alert-active { color: #ff3b3b; font-weight: bold; animation: pulse 2s infinite; }
.alert-quiet { color: #00ff66; }

@keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}
</style>
</head>
<body>

<img id="princess" src="IMG_4728.png">

<div class="grid">

    <!-- ==================== TOP ROW (72% Height) ==================== -->
    
    <!-- Col 1 Top: Weather Map (Expanded Width) -->
    <div class="mapBox">
        <iframe 
            src="https://embed.windy.com/embed2.html?lat=26.2972&lon=-80.1606&zoom=11&level=surface&overlay=rain&menu=&message=&marker=true&calendar=now&metricWind=default&metricTemp=%C2%B0F" 
            width="100%" height="100%" style="border: none;">
        </iframe>
    </div>
    
    <!-- Col 2 Top: Video Double Stack -->
    <div class="video-double-stack">
        <!-- Deerfield Cam -->
        <div class="box" style="padding: 0; background: #000;">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/rdeoEeJ00xA?autoplay=1&mute=1&modestbranding=1&rel=0" style="border: none;" allowfullscreen></iframe>
        </div>
        <!-- St. Croix Cam -->
        <div class="box" style="padding: 0; background: #000;">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/lm1f6_4XB9g?autoplay=1&mute=1&modestbranding=1&rel=0" style="border: none;" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Col 3 Top: Detailed Weather Telemetry -->
    <div class="box">
        <div class="section-title">Deerfield Beach 33442</div>
        <div id="dfb-big-temp" class="big-temp-display">--°F</div>
        <div style="font-size: 12px; color: #b0b0b0; margin-bottom: 6px;" id="dfb-updated-time">Local Time: --</div>
        
        <div class="metric-row"><span>Humidity</span><b id="detail-humidity">--</b></div>
        <div class="metric-row"><span>Wind Metrics</span><b id="detail-wind">--</b></div>
        <div class="metric-row"><span>Apparent Temp</span><b id="detail-feels">--</b></div>
        <div class="metric-row"><span>UV Index</span><b id="detail-uv">--</b></div>
        <div class="metric-row"><span>Precip Probability</span><b id="detail-pop">0%</b></div>
    </div>

    <!-- Col 4 Top: Key West Cam + Global Emergency Terminal Stack -->
    <div class="video-double-stack">
        <!-- Key West Live Cam -->
        <div class="box" style="padding: 0; background: #000;">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/8Rw-tZTeBjU?autoplay=1&mute=1&modestbranding=1&rel=0" style="border: none;" allowfullscreen></iframe>
        </div>
        <!-- High Priority Global Alerts -->
        <div class="box" style="border-color: #ff3b3b; background: #0a0101;">
            <div class="section-title" style="color: #ff3b3b; display: flex; align-items: center; gap: 6px;">
                <span style="display:inline-block; width:8px; height:8px; background:#ff3b3b; border-radius:50%; animation: pulse 1s infinite;"></span>
                Global Emergency Monitors
            </div>
            <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2px;">
                <div id="news-ticker">Scanning global security network streams...</div>
            </div>
        </div>
    </div>


    <!-- ==================== BOTTOM ROW (28% Height) ==================== -->
    
    <!-- Col 1 Bottom: Hourly Rain Panel -->
    <div class="box">
        <div class="section-title">Hourly Rain & Wind (33442)</div>
        <div id="hourly-rain-container" style="display: flex; justify-content: space-between; align-items: center; height: 100%; text-align: center;">
            <div style="color: #b0b0b0; font-size: 13px; width: 100%;">Loading timelines...</div>
        </div>
    </div>

    <!-- Col 2 Bottom: Hurricane Info -->
    <div class="box" style="justify-content: center; text-align: center;">
        <div class="section-title" style="margin-bottom: 2px;">Hurricane Tracker</div>
        <div id="caneCountdown" style="font-size: 12px; color: #b0b0b0;">Analyzing Basin...</div>
        <div id="caneStatus" class="alert-quiet" style="font-size: 18px; font-weight: bold; margin-top: 4px;">✓ Clear</div>
    </div>

    <!-- Col 3 & 4 Bottom: Shared Multi-City Graph -->
    <div class="box" style="grid-column: span 2; padding: 6px; position: relative;">
        <canvas id="multiCityChart" style="width: 100%; height: 100%; max-height: 100%;"></canvas>
    </div>

</div>

<script>
let telemetryChart = null;
let newsItems = [];
let newsIndex = 0;

function getTempColor(t){
    if(t >= 90) return "hot";
    if(t >= 80) return "warm";
    if(t >= 70) return "mid";
    return "cool";
}

// FETCH LIVE WORLD EMERGENCY/BREAKING ALERTS
async function fetchGlobalNews() {
    try {
        let res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ffeeds.bbci.co.uk%2Fnews%2Fworld%2Frss.xml");
        let data = await res.json();
        if (data.items && data.items.length > 0) {
            newsItems = data.items.map(item => item.title);
            cycleNews();
        }
    } catch(e) {
        newsItems = [
            "🚨 SECURITY MONITOR: Critical global feeds active and tracking.",
            "⚠️ PACIFIC BASIN: Geoseismic monitoring tracking minor pressure fluctuations.",
            "📡 METEOROLOGICAL DISRUPTION: Checking global extreme heat anomaly alerts."
        ];
        cycleNews();
    }
}

function cycleNews() {
    if (newsItems.length === 0) return;
    const container = document.getElementById("news-ticker");
    container.style.opacity = 0;
    setTimeout(() => {
        container.innerHTML = newsItems[newsIndex];
        container.style.opacity = 1;
        newsIndex = (newsIndex + 1) % newsItems.length;
    }, 400);
}
setInterval(cycleNews, 10000);

async function checkTropicThreats() {
    try {
        let response = await fetch("https://api.weather.gov/alerts/active?category=Met&event=Hurricane%20Warning,Hurricane%20Watch,Tropical%20Storm%20Warning,Tropical%20Storm%20Watch");
        let data = await response.json();
        let statusBox = document.getElementById("caneStatus");
        if (data.features && data.features.length > 0) {
            statusBox.className = "alert-active";
            statusBox.innerHTML = "⚠️ CRITICAL STORM ACTIVE";
        } else {
            statusBox.className = "alert-quiet";
            statusBox.innerHTML = "✓ Basin Quiet";
        }
    } catch (e) {
        document.getElementById("caneStatus").innerHTML = "✓ Basin Quiet";
    }
}

function updateCountdown() {
    const now = new Date();
    const endOfSeason = new Date(now.getFullYear(), 10, 30, 23, 59, 59);
    const daysLeft = Math.ceil((endOfSeason - now) / (1000 * 60 * 60 * 24));
    document.getElementById("caneCountdown").innerHTML = (daysLeft > 0 && daysLeft <= 183) ? daysLeft + " days until season ends" : "Off-Season Phase";
}

function renderTelemetryGraph(hours, dfb, az, vi, riyadh) {
    const ctx = document.getElementById('multiCityChart').getContext('2d');
    if (telemetryChart) telemetryChart.destroy();

    telemetryChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: hours,
            datasets: [
                { label: 'Deerfield', data: dfb, borderColor: '#45f3ff', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.2 },
                { label: 'Anthem AZ', data: az, borderColor: '#ffd84d', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.2 },
                { label: 'St. Croix', data: vi, borderColor: '#00ff66', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.2 },
                { label: 'Riyadh', data: riyadh, borderColor: '#ff8c1a', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.2 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, labels: { color: '#fff', font: { size: 10 }, boxWidth: 10 }, position: 'top' }
            },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#b0b0b0', font: { size: 8 }, maxTicksLimit: 6 } },
                y: { grid: { color: '#111' }, ticks: { color: '#b0b0b0', font: { size: 9 } } }
            }
        }
    });
}

async function executeCoreDataPipeline(){
    updateCountdown();
    checkTropicThreats();

    // DFB METRICS ENGINE
    try {
        let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,uv_index&hourly=temperature_2m,precipitation_probability,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York&forecast_days=1");
        let d1 = await r1.json();
        
        if (d1.current) {
            document.getElementById("dfb-big-temp").className = "big-temp-display " + getTempColor(d1.current.temperature_2m);
            document.getElementById("dfb-big-temp").innerHTML = Math.round(d1.current.temperature_2m) + "°F";
            document.getElementById("detail-humidity").innerHTML = d1.current.relative_humidity_2m + "%";
            document.getElementById("detail-wind").innerHTML = Math.round(d1.current.wind_speed_10m) + " mph";
            document.getElementById("detail-feels").innerHTML = Math.round(d1.current.apparent_temperature) + "°F";
            document.getElementById("detail-uv").innerHTML = d1.current.uv_index;
        }
        document.getElementById("dfb-updated-time").innerHTML = "Local: " + new Date().toLocaleTimeString("en-US", {timeZone: "America/New_York", hour: "2-digit", minute: "2-digit"});

        if (d1.hourly) {
            let rainContainer = document.getElementById("hourly-rain-container");
            rainContainer.innerHTML = "";
            let steps = [2, 5, 8, 11, 14]; 
            steps.forEach(idx => {
                let timeStr = d1.hourly.time[idx].split("T")[1];
                let pop = d1.hourly.precipitation_probability[idx];
                let wSpeed = Math.round(d1.hourly.wind_speed_10m[idx]);
                
                let block = document.createElement("div");
                block.style.flex = "1";
                block.innerHTML = `
                    <div style="font-size: 11px; color: #888;">${timeStr}</div>
                    <div style="font-size: 14px; font-weight: bold; color: #66ccff; margin: 2px 0;">${pop}%</div>
                    <div style="font-size: 11px; color: #ffd84d;">${wSpeed}m</div>
                `;
                rainContainer.appendChild(block);
            });
            document.getElementById("detail-pop").innerHTML = d1.hourly.precipitation_probability[0] + "%";
        }

        // BACKGROUND TELEMETRY FETCHES FOR COMPOSITE GRAPH
        let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current=temperature_2m&hourly=temperature_2m&temperature_unit=fahrenheit&timezone=America/Phoenix&forecast_days=1");
        let d2 = await r2.json();

        let r3 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=17.7466&longitude=-64.7031&current=temperature_2m&hourly=temperature_2m&temperature_unit=fahrenheit&timezone=America/Port_of_Spain&forecast_days=1");
        let d3 = await r3.json();

        let r4 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=24.6877&longitude=46.7219&current=temperature_2m&hourly=temperature_2m&temperature_unit=fahrenheit&timezone=Asia/Riyadh&forecast_days=1");
        let d4 = await r4.json();

        if (d1.hourly && d2.hourly && d3.hourly && d4.hourly) {
            let timeLabels = d1.hourly.time.map(t => t.split('T')[1]);
            renderTelemetryGraph(timeLabels, d1.hourly.temperature_2m, d2.hourly.temperature_2m, d3.hourly.temperature_2m, d4.hourly.temperature_2m);
        }
    } catch (error) {
        console.log("Telemetry fetch pipeline holding for network...", error);
    }
}

// INITIALIZE SYSTEM ENGINE
executeCoreDataPipeline();
fetchGlobalNews();
setInterval(executeCoreDataPipeline, 300000); // 5 min interval refresh loops
setInterval(fetchGlobalNews, 900000); // 15 min global news stream query updates
</script>

</body>
</html>
