<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* PRINCESS MAIN */
#princess {
    position: fixed;
    top: 10px;
    left: 10px;
    height: 120px;
    width: auto;
    z-index: 99999;
    pointer-events: none;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    height: 100vh;
}

/* LEFT RADAR CONTAINER */
.mapBox {
    background: #ffffff;
    width: 100%;
    height: 100%;
}

/* RIGHT GRID */
.rightGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
    height: 100%;
}

/* BOXES */
.box {
    background: #050505;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    padding: 15px;
    overflow: hidden;
    font-size: 24px;
    line-height: 1.3;
}

/* CITY NAMES */
.cityName {
    font-size: 26px;
    display: block;
    margin-bottom: 2px;
}

/* TEMP COLORS */
.hot { color: #ff3b3b; }
.warm { color: #ff8c1a; }
.mid { color: #ffd84d; }
.cool { color: #66ccff; }

/* TEMPERATURE NUMBERS */
.bigTemp {
    font-size: 32px;
    font-weight: bold;
}

/* SYSTEM CLOCK DISPLAY */
.timeDisplay {
    font-size: 24px;
    color: #e0e0e0;
    margin-top: 2px;
}

/* WEATHER DETAILS LINES */
.weatherDetails {
    font-size: 20px;
    color: #b0b0b0;
    margin-top: 8px;
    line-height: 1.4;
}

/* HURRICANE SUBTEXT */
.hurricaneCountdown {
    font-size: 18px;
    color: #b0b0b0;
    margin-top: 2px;
    display: block;
}

.hurricaneStatusText {
    font-size: 22px;
    margin-top: 8px;
    font-weight: bold;
}

/* Status colors */
.noStorms { color: #00ff66; }
.activeStorm { color: #ff3b3b; }

</style>
</head>

<body>

<img id="princess" src="IMG_4728.png">

<div class="grid">

    <!-- LEFT SIDE: Radar Embed -->
    <div class="mapBox">
        <iframe 
            src="https://embed.windy.com/embed2.html?lat=26.3184&lon=-80.0998&zoom=9&level=surface&overlay=radar&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=%C2%B0F&radarRange=-1" 
            width="100%" 
            height="100%" 
            style="border: none;">
        </iframe>
    </div>

    <!-- RIGHT SIDE -->
    <div class="rightGrid">

        <div class="box" style="display: flex; align-items: center; justify-content: center;">
            <img id="princessMood" src="princess_sunny.gif"
                 style="width:100%;height:100%;object-fit:contain;">
        </div>

        <div class="box">
            <b class="cityName">Deerfield Beach</b>
            <div id="dfbTemp" class="bigTemp">--</div>
            <div id="dfbTime" class="timeDisplay"></div>
            <div class="weatherDetails">
                <div id="dfbHumidity">Humidity: --</div>
                <div id="dfbWind">Wind: --</div>
            </div>
        </div>

        <!-- HURRICANE STATUS BOX -->
        <div class="box">
            <b>Hurricane Basin</b>
            <div id="caneCountdown" class="hurricaneCountdown">Calculating season...</div>
            <div id="caneStatus" class="hurricaneStatusText noStorms">Checking NHC Feed...</div>
        </div>

        <div class="box">
            <b class="cityName">Anthem AZ</b>
            <div id="azTemp" class="bigTemp">--</div>
            <div id="azTime" class="timeDisplay"></div>
            <div class="weatherDetails">
                <div id="azHumidity">Humidity: --</div>
                <div id="azWind">Wind: --</div>
            </div>
        </div>

    </div>

</div>

<script>

function tempClass(t){
    if(t >= 90) return "hot";
    if(t >= 80) return "warm";
    if(t >= 70) return "mid";
    return "cool";
}

function getWindDirection(deg) {
    const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    const index = Math.round(((deg % 360) / 45)) % 8;
    return directions[index];
}

// Logic to determine countdown to end of season
function updateHurricaneSeasonCountdown() {
    const now = new Date();
    const year = now.getFullYear();
    const endOfSeason = new Date(year, 10, 30, 23, 59, 59); // November 30th
    
    const timeDiff = endOfSeason - now;
    const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
    
    if (daysLeft > 0 && daysLeft <= 183) { // Inside season (June 1 - Nov 30)
        document.getElementById("caneCountdown").innerHTML = daysLeft + " days until season ends";
    } else {
        document.getElementById("caneCountdown").innerHTML = "Off-Season";
    }
}

async function checkHurricanes() {
    try {
        // Fetches open active storm tracking metrics via an open API tracking the NHC feeds
        let response = await fetch("https://api.weather.gov/alerts/active?category=Met&event=Hurricane%20Warning,Hurricane%20Watch,Tropical%20Storm%20Warning,Tropical%20Storm%20Watch");
        let data = await response.json();
        
        let statusBox = document.getElementById("caneStatus");
        
        // Simple mock parse check of NOAA/NHC active features
        if (data.features && data.features.length > 0) {
            statusBox.className = "hurricaneStatusText activeStorm";
            
            // Extract storm tracking context if present, or generic warning
            let headline = data.features[0].properties.headline;
            if(headline.toLowerCase().includes("hurricane")) {
                statusBox.innerHTML = "⚠️ ACTIVE HURRICANE";
            } else {
                statusBox.innerHTML = "⚠️ TROPICAL STORM ACTIVE";
            }
        } else {
            statusBox.className = "hurricaneStatusText noStorms";
            statusBox.innerHTML = "✓ No Active Storms";
        }
    } catch (e) {
        // Fallback safely if network check blips
        document.getElementById("caneStatus").innerHTML = "✓ Basin Quiet";
    }
}

async function load(){
    updateHurricaneSeasonCountdown();
    checkHurricanes();

    // 1. DEERFIELD BEACH FETCH
    let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph");
    let res1 = await r1.json();
    let dfb = res1.current;

    if (dfb) {
        document.getElementById("dfbTemp").className = "bigTemp " + tempClass(dfb.temperature_2m);
        document.getElementById("dfbTemp").innerHTML = dfb.temperature_2m + "°F";
        document.getElementById("dfbHumidity").innerHTML = "Humidity: " + dfb.relative_humidity_2m + "%";
        document.getElementById("dfbWind").innerHTML = "Wind: " + Math.round(dfb.wind_speed_10m) + " mph " + getWindDirection(dfb.wind_direction_10m);
    }

    document.getElementById("dfbTime").innerHTML =
        new Date().toLocaleTimeString("en-US", {
            timeZone: "America/New_York",
            hour: "2-digit",
            minute: "2-digit"
        });

    // PRINCESS MOOD LOGIC
    let mood = "princess_sunny.gif";
    if (dfb) {
        if (dfb.temperature_2m >= 90) mood = "princess_hot.gif";
        else if (dfb.weather_code >= 95) mood = "princess_storm.gif";
        else if (dfb.weather_code >= 51 && dfb.weather_code <= 67) mood = "princess_rain.gif";
    }
    document.getElementById("princessMood").src = mood;


    // 2. ANTHEM AZ FETCH
    let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph");
    let res2 = await r2.json();
    let az = res2.current;

    if (az) {
        document.getElementById("azTemp").className = "bigTemp " + tempClass(az.temperature_2m);
        document.getElementById("azTemp").innerHTML = az.temperature_2m + "°F";
        document.getElementById("azHumidity").innerHTML = "Humidity: " + az.relative_humidity_2m + "%";
        document.getElementById("azWind").innerHTML = "Wind: " + Math.round(az.wind_speed_10m) + " mph " + getWindDirection(az.wind_direction_10m);
    }

    document.getElementById("azTime").innerHTML =
        new Date().toLocaleTimeString("en-US", {
            timeZone: "America/Phoenix",
            hour: "2-digit",
            minute: "2-digit"
        });
}

load();
setInterval(load, 300000);

</script>

</body>
</html>
