<!DOCTYPE html>
<html>
<head>
  <title>Princess Weather Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
      overflow: hidden;
    }

    /* HEADER (clean + smaller + official pink text) */
    header {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .title {
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 15px;
      color: #ff66cc;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 11px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      right: 10px;
      top: 6px;
      font-size: 11px;
      color: #ff66cc;
    }

    /* MAIN LAYOUT */
    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 60px);
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
      position: relative;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #ccc;
    }

    /* BIG TEMPS */
    .temp {
      font-size: 42px;
      color: #00d4ff;
      margin: 0;
    }

    .meta {
      font-size: 14px;
      color: #aaa;
    }

    /* RADAR */
    .radar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    /* RADAR SWEEP (VISUAL ONLY) */
    .sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg,
        transparent 40%,
        rgba(0,255,255,0.12),
        transparent 60%);
      animation: sweep 2.8s linear infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* EMERGENCY MODE (VISUAL ONLY) */
    body.emergency {
      background: #140000;
    }

  </style>
</head>

<body>

<header>
  <div class="title">PRINCESS WEATHER COMMAND CENTER</div>
  <div class="subtitle">Visual Monitoring System • No Audio Mode</div>
  <div class="badge">🐾 PRINCESS AI</div>
</header>

<div class="grid">

  <!-- LEFT: RADAR -->
  <div class="panel">
    <h2>Hurricane / Radar Feed</h2>

    <div style="position:relative;height:100%;">
      <img
        class="radar"
        src="https://radar.weather.gov/ridge/standard/CONUS_loop.gif"
      />
      <div class="sweep"></div>
    </div>
  </div>

  <!-- RIGHT: DATA STACK -->
  <div style="display:grid;grid-template-rows:1fr 1fr;gap:8px;">

    <div class="panel">
      <h2>Deerfield Beach</h2>
      <div class="temp" id="dfbTemp">--</div>
      <div class="meta" id="dfbMeta">Loading...</div>
    </div>

    <div class="panel">
      <h2>Anthem, Arizona</h2>
      <div class="temp" id="azTemp">--</div>
      <div class="meta" id="azMeta">Loading...</div>
    </div>

  </div>

</div>

<script>

let dfb = {};
let az = {};
let alerts = 0;

/* WEATHER */
async function loadWeather() {

  // Deerfield Beach (FORCED F)
  let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
  dfb = (await r1.json()).current_weather;

  document.getElementById("dfbTemp").innerHTML = dfb.temperature + "°F";
  document.getElementById("dfbMeta").innerHTML =
    "Wind " + dfb.windspeed + " mph • Local FL";

  // Anthem AZ (FORCED F)
  let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
  az = (await r2.json()).current_weather;

  document.getElementById("azTemp").innerHTML = az.temperature + "°F";
  document.getElementById("azMeta").innerHTML =
    "Wind " + az.windspeed + " mph • Local AZ";

}

/* NOAA ALERTS (emergency trigger only) */
async function loadAlerts() {
  try {
    let r = await fetch("https://api.weather.gov/alerts/active?area=FL");
    let data = await r.json();

    alerts = data.features.length;

    if (alerts >= 3) {
      document.body.classList.add("emergency");
    } else {
      document.body.classList.remove("emergency");
    }

  } catch (e) {
    // silent fail (no sound system)
  }
}

/* RUN */
loadWeather();
loadAlerts();
setInterval(loadWeather, 300000);
setInterval(loadAlerts, 300000);

</script>

</body>
</html>
