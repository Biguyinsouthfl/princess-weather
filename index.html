<!DOCTYPE html>
<html>
<head>
  <img src="IMG_4719.png"
     style="position:absolute;left:8px;top:6px;width:150px;height:150px;border-radius:50%;">
  <title>Princess Weather Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    header {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .title {
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 15px;
      color: #ff66cc;
    }

    .subtitle {
      font-size: 11px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      right: 10px;
      top: 6px;
      font-size: 11px;
      color: #ff66cc;
    }

    /* MAIN GRID */
    .grid {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 60px);
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #ccc;
    }

    /* RADAR (ZOOMED SOUTH FLORIDA CENTERED) */
    .radarWrap {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 8px;
    }

    .radar {
      width: 150%;
      height: 150%;
      object-fit: cover;

      /* SHIFT DOWN TO MIAMI / FORT LAUDERDALE ZONE */
      transform: translate(-20%, -15%);
    }

    .sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg,
        transparent 40%,
        rgba(0,255,255,0.12),
        transparent 60%);
      animation: sweep 2.8s linear infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* RIGHT SIDE STACK */
    .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }

    /* TEMPERATURE (75% SIZE vs before) */
    .temp {
      font-size: 28px;
      margin: 0;
    }

    /* META TEXT (200% MORE IMPORTANT VISUAL WEIGHT) */
    .meta {
      font-size: 16px;
      font-weight: bold;
      margin-top: 4px;
    }

    /* TEMPERATURE COLORS */
    .hot { color: #ff3b3b; }
    .warm { color: #ff8c1a; }
    .mild { color: #ffd84d; }
    .cool { color: #66ccff; }

@keyframes lightningFlash {
  0%   { filter: brightness(1); }
  10%  { filter: brightness(2.5) contrast(1.2); }
  20%  { filter: brightness(1); }
  100% { filter: brightness(1); }
}

/* This is what we will turn ON and OFF */
.lightning {
  animation: lightningFlash 1.2s infinite;
}
    
  </style>
</head>

<body>

<header>
  <div class="title">PRINCESS WEATHER COMMAND CENTER</div>
  <div class="subtitle">Visual Monitoring System • No Sound Mode</div>
  <div class="badge">🐾 AI ACTIVE</div>
</header>

<div class="grid">

  <!-- 🛰 RADAR (FOCUSED SOUTH FLORIDA) -->
  <div class="panel" id="radarPanel">
    <h2>South Florida Radar Focus (Miami / Fort Lauderdale Center)</h2>

    <div class="radarWrap">
      <img class="radar"
        src="https://radar.weather.gov/ridge/standard/SOUTHEAST_loop.gif">
      <div class="sweep"></div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="stack">

    <div class="panel">
      <h2>Deerfield Beach</h2>

      <div id="dfbTemp" class="temp">--</div>
      <div id="dfbMeta" class="meta">Loading...</div>
      <div id="dfbTime" class="meta"></div>

    </div>

    <div class="panel">
      <h2>Anthem, Arizona</h2>

      <div id="azTemp" class="temp">--</div>
      <div id="azMeta" class="meta">Loading...</div>
      <div id="azTime" class="meta"></div>

    </div>

  </div>

</div>

<script>

let dfb = {};
let az = {};

/* COLOR CLASS LOGIC */
function tempClass(t) {
  if (t >= 90) return "temp hot";
  if (t >= 80) return "temp warm";
  if (t >= 70) return "temp mild";
  return "temp cool";
}

/* WEATHER */
async function loadWeather() {

  // Deerfield Beach
  let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
  dfb = (await r1.json()).current_weather;

  let dfbTempEl = document.getElementById("dfbTemp");
  dfbTempEl.className = tempClass(dfb.temperature);
  dfbTempEl.innerHTML = dfb.temperature + "°F";

  document.getElementById("dfbMeta").innerHTML =
    "Wind: " + dfb.windspeed + " mph • Fort Lauderdale Region";

  document.getElementById("dfbTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  // Anthem AZ
  let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
  az = (await r2.json()).current_weather;

  let azTempEl = document.getElementById("azTemp");
  azTempEl.className = tempClass(az.temperature);
  azTempEl.innerHTML = az.temperature + "°F";

  document.getElementById("azMeta").innerHTML =
    "Wind: " + az.windspeed + " mph • Arizona";

  document.getElementById("azTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

}

loadWeather();
setInterval(loadWeather, 300000);

</script>

</body>
</html>
