<!DOCTYPE html>
<html>
<head>
  <title>Princess Weather Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    header {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .title {
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 15px;
      color: #ff66cc;
    }

    .subtitle {
      font-size: 11px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      right: 10px;
      top: 6px;
      font-size: 11px;
      color: #ff66cc;
    }

    .grid {
      display: grid;
      grid-template-columns: 2.2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 60px);
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #ccc;
    }

    /* RADAR */
    .radarWrap {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 8px;
    }

    .radar {
      width: 150%;
      height: 150%;
      object-fit: cover;
      transform: translate(-18%, -12%);
    }

    .sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg,
        transparent 40%,
        rgba(0,255,255,0.12),
        transparent 60%);
      animation: sweep 2.8s linear infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* LIGHTNING EFFECT (NO SOUND) */
    @keyframes lightningFlash {
      0% { filter: brightness(1); }
      10% { filter: brightness(2.5) contrast(1.2); }
      20% { filter: brightness(1); }
      100% { filter: brightness(1); }
    }

    .lightning {
      animation: lightningFlash 1.2s infinite;
    }

    .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }

    .temp {
      font-size: 28px;
      margin: 0;
    }

    .meta {
      font-size: 16px;
      font-weight: bold;
      margin-top: 4px;
    }

    .hot { color: #ff3b3b; }
    .warm { color: #ff8c1a; }
    .mild { color: #ffd84d; }
    .cool { color: #66ccff; }

  </style>
</head>

<body>

<header>
  <img src="IMG_4719.png"
     style="position:absolute;left:8px;top:6px;width:130px;height:auto;border-radius:6px;z-index:9999;pointer-events:none;">
  <div class="title">PRINCESS WEATHER COMMAND CENTER</div>
  <div class="subtitle">Visual Monitoring System • No Sound Mode</div>
  <div class="badge">🐾 AI ACTIVE</div>
</header>

<div class="grid">

  <!-- RADAR PANEL -->
  <div class="panel" id="radarPanel">

    <h2>South Florida Radar Focus</h2>

    <div class="radarWrap">
      <img class="radar"
        src="https://radar.weather.gov/ridge/standard/SOUTHEAST_loop.gif">
      <div class="sweep"></div>
    </div>

  </div>

  <!-- WEATHER STACK -->
  <div class="stack">

    <div class="panel">
      <h2>Deerfield Beach</h2>
      <div id="dfbTemp" class="temp">--</div>
      <div id="dfbMeta" class="meta">Loading...</div>
      <div id="dfbTime" class="meta"></div>
    </div>

    <div class="panel">
      <h2>Anthem, Arizona</h2>
      <div id="azTemp" class="temp">--</div>
      <div id="azMeta" class="meta">Loading...</div>
      <div id="azTime" class="meta"></div>
    </div>

  </div>

</div>

<script>

/* ALERT SYSTEM (LIGHTNING TRIGGER) */
async function loadAlerts() {

  try {
    let r = await fetch("https://api.weather.gov/alerts/active?area=FL");
    let data = await r.json();

    let alerts = data.features.length;

    let radar = document.getElementById("radarPanel");

    if (!radar) return;

    if (alerts >= 1 && alerts <= 2) {
      radar.classList.add("lightning");
    }

    else if (alerts >= 3 && alerts <= 4) {
      radar.classList.add("lightning");
    }

    else if (alerts >= 5) {
      radar.classList.add("lightning");
    }

    else {
      radar.classList.remove("lightning");
    }

  } catch (e) {
    // silent fail
  }
}

/* WEATHER */
async function loadWeather() {

  // Deerfield Beach
  let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
  let dfb = (await r1.json()).current_weather;

  let dfbTempEl = document.getElementById("dfbTemp");
  dfbTempEl.className = "temp " + tempClass(dfb.temperature);
  dfbTempEl.innerHTML = dfb.temperature + "°F";

  document.getElementById("dfbMeta").innerHTML =
    "Wind: " + dfb.windspeed + " mph • Fort Lauderdale Region";

  document.getElementById("dfbTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  // Anthem AZ
  let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
  let az = (await r2.json()).current_weather;

  let azTempEl = document.getElementById("azTemp");
  azTempEl.className = "temp " + tempClass(az.temperature);
  azTempEl.innerHTML = az.temperature + "°F";

  document.getElementById("azMeta").innerHTML =
    "Wind: " + az.windspeed + " mph • Arizona";

  document.getElementById("azTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

}

/* TEMP COLOR LOGIC */
function tempClass(t) {
  if (t >= 90) return "hot";
  if (t >= 80) return "warm";
  if (t >= 70) return "mild";
  return "cool";
}

/* RUN LOOPS */
loadWeather();
loadAlerts();

setInterval(loadWeather, 300000);
setInterval(loadAlerts, 300000);

</script>

</body>
</html>
