<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

    #princess {
    position: fixed;
    top: 2px;
    left: 2px;
    height: 120px;
    width: auto;
    z-index: 99999;
    pointer-events: none;
}
    
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000000;
    color: white;
    font-family: Arial;
    height: 100vh;
    overflow: hidden;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #111;
    border-bottom: 2px solid #45f3ff;
}

.header img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

/* MAIN GRID */
.grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    height: calc(100vh - 80px);
}

/* MAP */
#map {
    width: 100%;
    height: 100%;
}

/* RIGHT 2x2 GRID */
.rightGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

/* BOXES */
.box {
    background: #050505;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    padding: 10px;
}
}

/* PRINCESS FLOAT */
#princess {
    position: fixed;
    top: 85px;
    right: 15px;
    height: 150px;
    width: auto;
    z-index: 9999;
    pointer-events: none;
}

/* TEMP COLORS */
.hot { color: #ff3b3b; }
.warm { color: #ff8c1a; }
.mid { color: #ffd84d; }
.cool { color: #66ccff; }

.bigTemp { font-size: 28px; font-weight: bold; }
</style>
</head>

<body>

<!-- PRINCESS FOREGROUND -->

<img id="princess" src="IMG_4728.png">
    
<!-- HEADER -->
<div class="header">
    <img src="IMG_4728.png">
    <h3 style="margin-left:10px;">Weather Dashboard</h3>
</div>

<!-- GRID -->
<div class="grid">

    <!-- LEAFLET MAP -->
    <div id="map"></div>

    <!-- RIGHT SIDE -->
    <div class="rightGrid">

        <div class="box">
    <img id="princessMood"
         src="princess_sunny.gif"
         style="width:100%;height:100%;object-fit:contain;">
</div>
        <div class="box">
            <b>Deerfield Beach</b>
            <div id="dfbTemp" class="bigTemp">--</div>
            <div id="dfbTime"></div>
        </div>

        <div class="box">
            <b>Hurricane Status</b><br>
            Monitoring Atlantic Basin
        </div>

        <div class="box">
            <b>Anthem AZ</b>
            <div id="azTemp" class="bigTemp">--</div>
            <div id="azTime"></div>
        </div>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP (BROWARD FOCUS)
var map = L.map('map').setView([26.1224, -80.1373], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
    
L.tileLayer('https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=YOUR_API_KEY', {
    opacity: 0.6
}).addTo(map);

// WEATHER
function tempClass(t){
    if(t>=90)return "hot";
    if(t>=80)return "warm";
    if(t>=70)return "mid";
    return "cool";
}

// WEATHER
function tempClass(t){
    if(t>=90)return "hot";
    if(t>=80)return "warm";
    if(t>=70)return "mid";
    return "cool";
}

async function load(){

let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
let dfb = (await r1.json()).current_weather;

document.getElementById("dfbTemp").className = "bigTemp " + tempClass(dfb.temperature);
document.getElementById("dfbTemp").innerHTML = dfb.temperature + "°F";

document.getElementById("dfbTime").innerHTML =
new Date().toLocaleTimeString("en-US",{
    timeZone:"America/New_York",
    hour:"2-digit",
    minute:"2-digit"
});

let mood = "princess_sunny.gif";

if (dfb.temperature >= 90) {
    mood = "princess_hot.gif";
}
else if (dfb.weathercode >= 95) {
    mood = "princess_storm.gif";
}
else if (dfb.weathercode >= 51 && dfb.weathercode <= 67) {
    mood = "princess_rain.gif";
}

document.getElementById("princessMood").src = mood;

let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
let az = (await r2.json()).current_weather;

document.getElementById("azTemp").className = "bigTemp " + tempClass(az.temperature);
document.getElementById("azTemp").innerHTML = az.temperature + "°F";

document.getElementById("azTime").innerHTML =
new Date().toLocaleTimeString("en-US",{
    timeZone:"America/Phoenix",
    hour:"2-digit",
    minute:"2-digit"
});

}

load();
setInterval(load,300000);
    
load();
setInterval(load,300000);

</script>

</body>
</html>
