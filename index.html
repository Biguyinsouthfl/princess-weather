<!DOCTYPE html>
<html>
<head>
  <title>Princess Weather Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
      transition: background 0.5s;
    }

    /* 🔴 EMERGENCY MODE */
    body.emergency {
      background: #1a0000;
    }

    /* TOP STRIP */
    .topbar {
      background: #ff00aa;
      color: black;
      font-family: "Courier New", monospace;
      font-weight: bold;
      padding: 6px;
      text-align: center;
      letter-spacing: 1px;
      font-size: 14px;
    }

    header {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .princess {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #111;
      border: 1px solid #333;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 11px;
      color: #ff66cc;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
    }

    .smallGrid {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
    }

    h2 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #ddd;
    }

    .big {
      font-size: 18px;
      color: #00d4ff;
    }

    iframe {
      width: 100%;
      height: 420px;
      border: 0;
      border-radius: 8px;
    }

    /* ⚡ LIGHTNING EFFECT (SIMULATED) */
    .flash {
      animation: flash 1.2s infinite;
    }

    @keyframes flash {
      0% { box-shadow: 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: 0 0 20px rgba(255,255,255,0.4); }
      100% { box-shadow: 0 0 0 rgba(255,255,255,0); }
    }

    .alert-red {
      color: #ff4444;
    }

  </style>
</head>

<body>

<div class="topbar">
  PRINCESS WEATHER COMMAND CENTER — VISUAL MONITOR SYSTEM
</div>

<header>
  <h1>Princess Weather Command Center</h1>

  <div class="princess" id="princessAI">
    🐾 Princess AI v3<br>
    Initializing...
  </div>
</header>

<div class="grid">

  <!-- 🌀 HURRICANE / RADAR -->
  <div class="panel" id="stormPanel">
    <h2>Hurricane / Storm Tracker (NOAA)</h2>

    <iframe src="https://www.nhc.noaa.gov/refresh/graphics_at1+shtml/205749.shtml?cone#contents"></iframe>
  </div>

  <!-- RIGHT SIDE -->
  <div class="smallGrid">

    <div class="panel" id="dfbPanel">
      <h2>Deerfield Beach</h2>
      <div id="dfbTemp" class="big">Loading...</div>
      <div id="dfbMood" style="font-size:12px;color:#aaa;"></div>
    </div>

    <div class="panel" id="azPanel">
      <h2>Anthem, Arizona</h2>
      <div id="azTemp" class="big">Loading...</div>
      <div id="azMood" style="font-size:12px;color:#aaa;"></div>
    </div>

  </div>

</div>

<script>
let dfb = {};
let az = {};
let alertLevel = 0;

/* WEATHER */
async function loadWeather() {

  // Deerfield Beach
  let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true");
  dfb = (await r1.json()).current_weather;

  document.getElementById("dfbTemp").innerHTML = dfb.temperature + "°F";

  // Anthem AZ
  let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true");
  az = (await r2.json()).current_weather;

  document.getElementById("azTemp").innerHTML = az.temperature + "°F";

  updateAI();
}

/* NOAA ALERTS */
async function loadAlerts() {
  let r = await fetch("https://api.weather.gov/alerts/active?area=FL");
  let data = await r.json();

  alertLevel = data.features.length;

  updateAI();
}

/* 🐕 PRINCESS AI v3 */
function updateAI() {

  let dfbMood = "Calm 🐶";
  let azMood = "Stable 🌵";
  let aiMood = "All systems normal";

  // EMERGENCY MODE
  if (alertLevel >= 3) {
    document.body.classList.add("emergency");
    aiMood = "HIGH STORM ACTIVITY ⚠️";
    dfbMood = "Uneasy 🐾";
  } else {
    document.body.classList.remove("emergency");
  }

  // WIND / HEAT RESPONSE (SIMPLIFIED)
  if (dfb.windspeed > 25) dfbMood = "Windy alert 🌬";
  if (dfb.temperature > 90) dfbMood = "Hot conditions ☀️";

  if (az.temperature > 100) azMood = "Extreme heat 🌵";

  // LIGHTNING SIMULATION
  if (alertLevel > 0) {
    document.getElementById("stormPanel").classList.add("flash");
  }

  document.getElementById("dfbMood").innerHTML = dfbMood;
  document.getElementById("azMood").innerHTML = azMood;
  document.getElementById("princessAI").innerHTML =
    "🐾 Princess AI v3<br>" + aiMood;
}

/* RUN */
loadWeather();
loadAlerts();
setInterval(loadWeather, 300000);
setInterval(loadAlerts, 300000);

</script>

</body>
</html>
