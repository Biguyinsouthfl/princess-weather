<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Princess Weather Command Center</title>

<style>
/* ===== BASE ===== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #0b0c10;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 10px;
    background: linear-gradient(90deg, #ff007f, #1a1a1a);
    border-bottom: 2px solid #45f3ff;
}

.logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid white;
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.title h1 {
    font-size: 24px;
    color: #fff;
}

.title p {
    font-size: 12px;
    color: #ffb3d9;
}

/* ===== GRID ===== */
.grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 10px;
    padding: 10px;
}

/* ===== PANELS ===== */
.panel {
    background: #1f2833;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    padding: 12px;
}

/* ===== WEATHER TEXT ===== */
.city {
    font-size: 18px;
    margin-bottom: 5px;
    color: #45f3ff;
}

.temp {
    font-size: 42px;
    font-weight: bold;
}

/* COLOR RULES */
.hot { color: #ff3b3b; }
.warm { color: #ff8c1a; }
.mild { color: #ffd84d; }
.cool { color: #66ccff; }

.meta {
    font-size: 14px;
    margin-top: 5px;
}

/* ===== PRINCESS PANEL ===== */
.princessBox {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.princessBox img {
    max-width: 100%;
    max-height: 260px;
    object-fit: contain;
}

/* ===== RIGHT SIDE STACK ===== */
.stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img src="IMG_4728.png" alt="Princess">
    </div>
    <div class="title">
      
    </div>
</div>

<!-- GRID -->
<div class="grid">

    <!-- LEFT: WEATHER -->
    <div class="panel">

        <div class="city">Deerfield Beach, FL</div>
        <div id="dfbTemp" class="temp">--</div>
        <div id="dfbMeta" class="meta">Loading...</div>
        <div id="dfbTime" class="meta"></div>

        <hr style="margin:10px 0;border-color:#333;">

        <div class="city">Anthem, AZ</div>
        <div id="azTemp" class="temp">--</div>
        <div id="azMeta" class="meta">Loading...</div>
        <div id="azTime" class="meta"></div>

    </div>

    <!-- RIGHT: PRINCESS -->
    <div class="stack">

        <div class="panel princessBox">
            <img id="princessMood" src="princess_sunny.gif" alt="Princess Mood">
        </div>

        <div class="panel">
            <div style="color:#45f3ff;font-size:14px;margin-bottom:5px;">System Status</div>
            <div style="font-size:13px;color:#aaa;">
                Weather feeds active<br>
                Princess AI monitoring enabled<br>
                No audio mode
            </div>
        </div>

    </div>

</div>

<script>

/* ===== TEMP COLOR FUNCTION ===== */
function getTempClass(t) {
    if (t >= 90) return "hot";
    if (t >= 80) return "warm";
    if (t >= 70) return "mild";
    return "cool";
}

/* ===== PRINCESS MOOD SYSTEM ===== */
function updatePrincess(temp, condition) {
    let img = document.getElementById("princessMood");

    condition = condition || "";

    if (condition.includes("Rain") || condition.includes("Shower")) {
        img.src = "princess_rain.gif";
    }
    else if (condition.includes("Thunder") || condition.includes("Storm")) {
        img.src = "princess_storm.gif";
    }
    else if (temp >= 90) {
        img.src = "princess_hot.gif";
    }
    else {
        img.src = "princess_sunny.gif";
    }
}

/* ===== WEATHER FUNCTION ===== */
async function loadWeather() {

    // Deerfield Beach
    let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
    let dfb = (await r1.json()).current_weather;

    document.getElementById("dfbTemp").className = "temp " + getTempClass(dfb.temperature);
    document.getElementById("dfbTemp").innerHTML = dfb.temperature + "°F";

    document.getElementById("dfbMeta").innerHTML =
        "Wind: " + dfb.windspeed + " mph • Fort Lauderdale Region";

    document.getElementById("dfbTime").innerHTML =
        "Local time: " + new Date().toLocaleTimeString("en-US", {
            timeZone: "America/New_York",
            hour: "2-digit",
            minute: "2-digit"
        });

    updatePrincess(dfb.temperature, "");


    // Anthem AZ
    let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
    let az = (await r2.json()).current_weather;

    document.getElementById("azTemp").className = "temp " + getTempClass(az.temperature);
    document.getElementById("azTemp").innerHTML = az.temperature + "°F";

    document.getElementById("azMeta").innerHTML =
        "Wind: " + az.windspeed + " mph • Arizona";

    document.getElementById("azTime").innerHTML =
        "Local time: " + new Date().toLocaleTimeString("en-US", {
            timeZone: "America/Phoenix",
            hour: "2-digit",
            minute: "2-digit"
        });

}

/* ===== START ===== */
loadWeather();
setInterval(loadWeather, 300000);

</script>

</body>
</html>
