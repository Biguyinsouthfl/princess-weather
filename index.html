<!DOCTYPE html>
<html>
<head>
  <title>Princess Weather Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial;
    }

    header {
      padding: 6px 10px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }

    .title {
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 15px;
      color: #ff66cc;
    }

    .subtitle {
      font-size: 11px;
      color: #aaa;
    }

    .badge {
      position: absolute;
      right: 10px;
      top: 6px;
      font-size: 11px;
      color: #ff66cc;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 60px);
    }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 10px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #ccc;
    }

    .radarWrap {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 8px;
    }

    /* “ZOOMED” RADAR LOOK */
    .radar {
      width: 140%;
      height: 140%;
      object-fit: cover;
      transform: translate(-15%, -10%);
    }

    .sweep {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg,
        transparent 40%,
        rgba(0,255,255,0.12),
        transparent 60%);
      animation: sweep 2.8s linear infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* RIGHT SIDE STACK */
    .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }

    /* BIGGER BUT 75% SCALE */
    .temp {
      font-size: 32px; /* reduced from earlier big sizes (~75%) */
      color: #00d4ff;
      margin: 0;
    }

    .meta {
      font-size: 13px;
      color: #aaa;
    }

    /* EMERGENCY MODE */
    body.emergency {
      background: #1a0000;
    }

  </style>
</head>

<body>

<header>
  <div class="title">PRINCESS WEATHER COMMAND CENTER</div>
  <div class="subtitle">Visual Monitoring System • No Sound Mode</div>
  <div class="badge">🐾 AI ACTIVE</div>
</header>

<div class="grid">

  <!-- 🌀 RADAR (FOCUSED SE FL / DEERFIELD ZONE SIMULATION) -->
  <div class="panel">
    <h2>Deerfield Beach Radar Focus (75–100 miles)</h2>

    <div class="radarWrap">
      <img class="radar"
        src="https://radar.weather.gov/ridge/standard/SOUTHEAST_loop.gif">
      <div class="sweep"></div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="stack">

    <div class="panel">
      <h2>Deerfield Beach</h2>
      <div class="temp" id="dfbTemp">--</div>
      <div class="meta" id="dfbMeta">Loading...</div>
      <div class="meta" id="dfbTime"></div>
    </div>

    <div class="panel">
      <h2>Anthem, Arizona</h2>
      <div class="temp" id="azTemp">--</div>
      <div class="meta" id="azMeta">Loading...</div>
      <div class="meta" id="azTime"></div>
    </div>

  </div>

</div>

<script>

let dfb = {};
let az = {};

/* WEATHER */
async function loadWeather() {

  // Deerfield Beach (F)
  let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current_weather=true&temperature_unit=fahrenheit");
  dfb = (await r1.json()).current_weather;

  document.getElementById("dfbTemp").innerHTML = dfb.temperature + "°F";
  document.getElementById("dfbMeta").innerHTML = "Wind " + dfb.windspeed + " mph";

  // Anthem AZ (F)
  let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current_weather=true&temperature_unit=fahrenheit");
  az = (await r2.json()).current_weather;

  document.getElementById("azTemp").innerHTML = az.temperature + "°F";
  document.getElementById("azMeta").innerHTML = "Wind " + az.windspeed + " mph";

  // LOCAL TIMES (DEVICE BASED)
  document.getElementById("dfbTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  document.getElementById("azTime").innerHTML =
    "Local time: " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

}

loadWeather();
setInterval(loadWeather, 300000);

</script>

</body>
</html>
