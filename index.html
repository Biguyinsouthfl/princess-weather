<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<!-- Include Chart.js for the Temperature Comparison Graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* PRINCESS LOGO BANNER (Top Left overlay) */
#princess {
    position: fixed;
    top: 15px;
    left: 15px;
    height: 80px;
    width: auto;
    z-index: 99999;
    pointer-events: none;
}

/* MASTER 3-COLUMN GRID MATCHING image_2.png */
.grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1.3fr;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

/* COLUMN SUB-LAYOUTS */
.leftColumn {
    display: grid;
    grid-template-rows: 2.8fr 1fr;
    gap: 10px;
    height: 100%;
}

.centerColumn {
    display: grid;
    grid-template-rows: auto 1fr 1fr; /* Two video displays split the space evenly */
    gap: 10px;
    height: 100%;
}

.rightColumn {
    display: grid;
    grid-template-rows: 2fr 1fr;
    gap: 10px;
    height: 100%;
}

/* 2x2 MINI GRID FOR WEATHER DATA */
.weatherMiniGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
}

/* STANDARD TILES */
.box {
    background: #050505;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    padding: 12px;
    overflow: hidden;
    font-size: 18px;
    line-height: 1.3;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
}

/* FULL EDGE-TO-EDGE MAP BOX */
.mapBox {
    background: #ffffff;
    border: 1px solid #45f3ff;
    border-radius: 8px;
    overflow: hidden;
    height: 100%;
}

/* TYPOGRAPHY SCALING */
.cityName {
    font-size: 20px;
    display: block;
    margin-bottom: 2px;
}

.bigTemp {
    font-size: 26px;
    font-weight: bold;
}

.timeDisplay {
    font-size: 16px;
    color: #e0e0e0;
}

.weatherDetails {
    font-size: 14px;
    color: #b0b0b0;
    margin-top: 4px;
}

/* HURRICANE BANNER DESIGN */
.hurricaneCountdown {
    font-size: 16px;
    color: #b0b0b0;
}
.hurricaneStatusText {
    font-size: 22px;
    font-weight: bold;
    margin-top: 5px;
}

/* STATUS HIGHLIGHT COLORS */
.hot { color: #ff3b3b; }
.warm { color: #ff8c1a; }
.mid { color: #ffd84d; }
.cool { color: #66ccff; }
.noStorms { color: #00ff66; }
.activeStorm { color: #ff3b3b; }

</style>
</head>
<body>

<img id="princess" src="IMG_4728.png">

<div class="grid">

    <!-- COLUMN 1: Left Side Layout -->
    <div class="leftColumn">
        <!-- Top: Weather Map -->
        <div class="mapBox">
            <iframe 
                src="https://embed.windy.com/embed2.html?lat=26.2972&lon=-80.1606&detailLat=26.2972&detailLon=-80.1606&zoom=11&level=surface&overlay=rain&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=true&metricWind=default&metricTemp=%C2%B0F&radarRange=-1" 
                width="100%" 
                height="100%" 
                style="border: none;">
            </iframe>
        </div>
        
        <!-- Bottom: 5-Day Forecast -->
        <div class="box" style="justify-content: space-around;">
            <b style="font-size: 16px; color: #45f3ff; margin-bottom: 2px;">5-Day Local Forecast (33442)</b>
            <div id="forecastContainer" style="display: flex; justify-content: space-between; align-items: center; height: 100%; text-align: center;">
                <div style="color: #b0b0b0; font-size: 14px; width: 100%;">Loading daily metrics...</div>
            </div>
        </div>
    </div>

    <!-- COLUMN 2: Center Layout -->
    <div class="centerColumn">
        <!-- Top: Hurricane Info -->
        <div class="box" style="justify-content: center; padding: 10px;">
            <b>Hurricane Center</b>
            <div id="caneCountdown" class="hurricaneCountdown">Calculating...</div>
            <div id="caneStatus" class="hurricaneStatusText noStorms">Checking Feed...</div>
        </div>

        <!-- Middle: New Live Video Feed -->
        <div class="box" style="padding: 0; background: #000;">
            <iframe 
                width="100%" 
                height="100%" 
                src="https://www.youtube.com/embed/lm1f6_4XB9g?autoplay=1&mute=1&modestbranding=1&rel=0" 
                title="Live Weather Feed" 
                style="border: none;" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <!-- Bottom: Video of Deerfield -->
        <div class="box" style="padding: 0; background: #000;">
            <iframe 
                width="100%" 
                height="100%" 
                src="https://www.youtube.com/embed/rdeoEeJ00xA?autoplay=1&mute=1&modestbranding=1&rel=0" 
                title="Deerfield Beach Live Cam" 
                style="border: none;" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <!-- COLUMN 3: Right Side Layout -->
    <div class="rightColumn">
        <!-- Top: 4-Quadrant City Layout -->
        <div class="weatherMiniGrid">
            <!-- Box 1: Deerfield -->
            <div class="box">
                <b class="cityName">Deerfield</b>
                <div id="dfbTemp" class="bigTemp">--</div>
                <div id="dfbTime" class="timeDisplay"></div>
                <div class="weatherDetails">
                    <div id="dfbHumidity">H: --</div>
                    <div id="dfbWind">W: --</div>
                </div>
            </div>

            <!-- Box 2: AZ -->
            <div class="box">
                <b class="cityName">Anthem AZ</b>
                <div id="azTemp" class="bigTemp">--</div>
                <div id="azTime" class="timeDisplay"></div>
                <div class="weatherDetails">
                    <div id="azHumidity">H: --</div>
                    <div id="azWind">W: --</div>
                </div>
            </div>

            <!-- Box 3: St. Croix -->
            <div class="box">
                <b class="cityName">St. Croix</b>
                <div id="viTemp" class="bigTemp">--</div>
                <div id="viTime" class="timeDisplay"></div>
                <div class="weatherDetails">
                    <div id="viHumidity">H: --</div>
                    <div id="viWind">W: --</div>
                </div>
            </div>

            <!-- Box 4: Riyadh -->
            <div class="box">
                <b class="cityName">Riyadh</b>
                <div id="kwTemp" class="bigTemp">--</div>
                <div id="kwTime" class="timeDisplay"></div>
                <div class="weatherDetails">
                    <div id="kwHumidity">H: --</div>
                    <div id="kwWind">W: --</div>
                </div>
            </div>
        </div>

        <!-- Bottom: Temp Graph Comparison -->
        <div class="box" style="padding: 8px; justify-content: center; position: relative;">
            <canvas id="tempComparisonChart" style="width: 100%; height: 100%; max-height: 100%;"></canvas>
        </div>
    </div>

</div>

<script>
let tempChart = null;

function tempClass(t){
    if(t >= 90) return "hot";
    if(t >= 80) return "warm";
    if(t >= 70) return "mid";
    return "cool";
}

function updateHurricaneSeasonCountdown() {
    const now = new Date();
    const endOfSeason = new Date(now.getFullYear(), 10, 30, 23, 59, 59);
    const daysLeft = Math.ceil((endOfSeason - now) / (1000 * 60 * 60 * 24));
    
    if (daysLeft > 0 && daysLeft <= 183) {
        document.getElementById("caneCountdown").innerHTML = daysLeft + " days until season ends";
    } else {
        document.getElementById("caneCountdown").innerHTML = "Off-Season";
    }
}

async function checkHurricanes() {
    try {
        let response = await fetch("https://api.weather.gov/alerts/active?category=Met&event=Hurricane%20Warning,Hurricane%20Watch,Tropical%20Storm%20Warning,Tropical%20Storm%20Watch");
        let data = await response.json();
        let statusBox = document.getElementById("caneStatus");
        
        if (data.features && data.features.length > 0) {
            statusBox.className = "hurricaneStatusText activeStorm";
            statusBox.innerHTML = "⚠️ ACTIVE STORM";
        } else {
            statusBox.className = "hurricaneStatusText noStorms";
            statusBox.innerHTML = "✓ Basin Quiet";
        }
    } catch (e) {
        document.getElementById("caneStatus").innerHTML = "✓ Basin Quiet";
    }
}

function buildChart(hours, dfbData, riyadhData) {
    const ctx = document.getElementById('tempComparisonChart').getContext('2d');
    
    if (tempChart) {
        tempChart.destroy();
    }

    tempChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: hours,
            datasets: [
                {
                    label: 'Deerfield',
                    data: dfbData,
                    borderColor: '#45f3ff',
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 1,
                    tension: 0.2
                },
                {
                    label: 'Riyadh',
                    data: riyadhData,
                    borderColor: '#ff8c1a',
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 1,
                    tension: 0.2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    labels: { color: '#fff', font: { size: 11 }, boxWidth: 12 },
                    position: 'top'
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    ticks: { color: '#b0b0b0', font: { size: 9 }, maxTicksLimit: 6 }
                },
                y: {
                    grid: { color: '#222' },
                    ticks: { color: '#b0b0b0', font: { size: 10 } }
                }
            }
        }
    });
}

async function load(){
    updateHurricaneSeasonCountdown();
    checkHurricanes();

    // 1. DEERFIELD BEACH CURRENT & HOURLY GRAPH DATA
    let r1 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.3184&longitude=-80.0998&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York&forecast_days=1");
    let res1 = await r1.json();
    let dfb = res1.current;
    if (dfb) {
        document.getElementById("dfbTemp").className = "bigTemp " + tempClass(dfb.temperature_2m);
        document.getElementById("dfbTemp").innerHTML = dfb.temperature_2m + "°F";
        document.getElementById("dfbHumidity").innerHTML = "H: " + dfb.relative_humidity_2m + "%";
        document.getElementById("dfbWind").innerHTML = "W: " + Math.round(dfb.wind_speed_10m) + " mph";
    }
    document.getElementById("dfbTime").innerHTML = new Date().toLocaleTimeString("en-US", {timeZone: "America/New_York", hour: "2-digit", minute: "2-digit"});

    // 2. ANTHEM ARIZONA
    let r2 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=33.8674&longitude=-112.1465&current=temperature_2m,relative_humidity_2m,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph");
    let res2 = await r2.json();
    let az = res2.current;
    if (az) {
        document.getElementById("azTemp").className = "bigTemp " + tempClass(az.temperature_2m);
        document.getElementById("azTemp").innerHTML = az.temperature_2m + "°F";
        document.getElementById("azHumidity").innerHTML = "H: " + az.relative_humidity_2m + "%";
        document.getElementById("azWind").innerHTML = "W: " + Math.round(az.wind_speed_10m) + " mph";
    }
    document.getElementById("azTime").innerHTML = new Date().toLocaleTimeString("en-US", {timeZone: "America/Phoenix", hour: "2-digit", minute: "2-digit"});

    // 3. CHRISTIANSTED, USVI
    let r3 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=17.7466&longitude=-64.7031&current=temperature_2m,relative_humidity_2m,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph");
    let res3 = await r3.json();
    let vi = res3.current;
    if (vi) {
        document.getElementById("viTemp").className = "bigTemp " + tempClass(vi.temperature_2m);
        document.getElementById("viTemp").innerHTML = vi.temperature_2m + "°F";
        document.getElementById("viHumidity").innerHTML = "H: " + vi.relative_humidity_2m + "%";
        document.getElementById("viWind").innerHTML = "W: " + Math.round(vi.wind_speed_10m) + " mph";
    }
    document.getElementById("viTime").innerHTML = new Date().toLocaleTimeString("en-US", {timeZone: "America/Port_of_Spain", hour: "2-digit", minute: "2-digit"});

    // 4. RIYADH, SAUDI ARABIA CURRENT & HOURLY GRAPH DATA
    let r4 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=24.6877&longitude=46.7219&current=temperature_2m,relative_humidity_2m,wind_speed_10m&hourly=temperature_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=Asia/Riyadh&forecast_days=1");
    let res4 = await r4.json();
    let kw = res4.current;
    if (kw) {
        document.getElementById("kwTemp").className = "bigTemp " + tempClass(kw.temperature_2m);
        document.getElementById("kwTemp").innerHTML = kw.temperature_2m + "°F";
        document.getElementById("kwHumidity").innerHTML = "H: " + kw.relative_humidity_2m + "%";
        document.getElementById("kwWind").innerHTML = "W: " + Math.round(kw.wind_speed_10m) + " mph";
    }
    document.getElementById("kwTime").innerHTML = new Date().toLocaleTimeString("en-US", {timeZone: "Asia/Riyadh", hour: "2-digit", minute: "2-digit"});

    // BUILD THE GRAPH SIDE-BY-SIDE HOURLY DATA
    if (res1.hourly && res4.hourly) {
        let hourlyLabels = res1.hourly.time.map(t => t.split('T')[1]);
        let deerfieldHourly = res1.hourly.temperature_2m;
        let riyadhHourly = res4.hourly.temperature_2m;
        
        buildChart(hourlyLabels, deerfieldHourly, riyadhHourly);
    }

    // 5. 5-DAY LOCAL FORECAST (33442)
    try {
        let r5 = await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.2972&longitude=-80.1606&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York");
        let res5 = await r5.json();
        
        if (res5 && res5.daily) {
            let container = document.getElementById("forecastContainer");
            container.innerHTML = ""; 
            
            for (let i = 0; i < 5; i++) {
                let dateStr = res5.daily.time[i];
                let maxTemp = Math.round(res5.daily.temperature_2m_max[i]);
                let minTemp = Math.round(res5.daily.temperature_2m_min[i]);
                
                let dateObj = new Date(dateStr + "T00:00:00");
                let dayName = dateObj.toLocaleDateString("en-US", { weekday: 'short' });
                
                let dayCard = document.createElement("div");
                dayCard.style.flex = "1";
                dayCard.style.display = "flex";
                dayCard.style.flexDirection = "column";
                dayCard.style.gap = "2px";
                
                dayCard.innerHTML = `
                    <div style="font-size: 14px; font-weight: bold; color: #fff;">${dayName}</div>
                    <div style="font-size: 16px; font-weight: bold; color: #ff8c1a;">${maxTemp}°</div>
                    <div style="font-size: 12px; color: #66ccff;">${minTemp}°</div>
                `;
                container.appendChild(dayCard);
            }
        }
    } catch (err) {
        document.getElementById("forecastContainer").innerHTML = "<div style='color: #ff3b3b;'>Forecast Offline</div>";
    }
}

load();
setInterval(load, 300000);
</script>

</body>
</html>
